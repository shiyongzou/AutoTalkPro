name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/AutoTalkPro-macOS.zip" "Auto Talk Pro.app"
      - uses: actions/upload-artifact@v4
        with:
          name: AutoTalkPro-macOS
          path: AutoTalkPro-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "AutoTalkPro-Windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: AutoTalkPro-Windows
          path: AutoTalkPro-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AutoTalkPro-macOS/AutoTalkPro-macOS.zip
            artifacts/AutoTalkPro-Windows/AutoTalkPro-Windows.zip
