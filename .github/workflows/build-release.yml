name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/AutoTalkPro-macOS.zip" "Auto Talk Pro.app"
      - uses: actions/upload-artifact@v4
        with:
          name: AutoTalkPro-macOS
          path: AutoTalkPro-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "AutoTalkPro-Windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: AutoTalkPro-Windows
          path: AutoTalkPro-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # GitHub Release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AutoTalkPro-macOS/AutoTalkPro-macOS.zip
            artifacts/AutoTalkPro-Windows/AutoTalkPro-Windows.zip

      # Gitee Release（国内下载）
      - name: Create Gitee Release
        if: secrets.GITEE_TOKEN != ''
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # 创建 Gitee Release
          RELEASE_ID=$(curl -s -X POST "https://gitee.com/api/v5/repos/zoushiyong_admin/AutoTalkPro/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG_NAME}\",
              \"name\": \"${TAG_NAME}\",
              \"body\": \"AutoTalk Pro ${TAG_NAME}\\n\\n- macOS (Intel/Apple Silicon)\\n- Windows x64\",
              \"prerelease\": false
            }" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")

          echo "Gitee Release ID: $RELEASE_ID"

          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "None" ]; then
            # 上传 macOS 包
            curl -s -X POST "https://gitee.com/api/v5/repos/zoushiyong_admin/AutoTalkPro/releases/${RELEASE_ID}/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@artifacts/AutoTalkPro-macOS/AutoTalkPro-macOS.zip"

            # 上传 Windows 包
            curl -s -X POST "https://gitee.com/api/v5/repos/zoushiyong_admin/AutoTalkPro/releases/${RELEASE_ID}/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@artifacts/AutoTalkPro-Windows/AutoTalkPro-Windows.zip"

            echo "Gitee Release uploaded successfully"
          else
            echo "Gitee Release creation failed, skipping upload"
          fi
