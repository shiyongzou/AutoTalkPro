name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Generate tutorial PDF
        run: |
          pip3 install --break-system-packages weasyprint
          pandoc docs/tutorial.md -f markdown -t html5 --standalone --metadata title="AutoTalk Pro 新手入门教程" -o /tmp/tutorial.html
          python3 -c "
          html = open('/tmp/tutorial.html').read()
          css = '<style>body{font-family:system-ui,sans-serif;max-width:800px;margin:0 auto;padding:40px;line-height:1.8;color:#333}h1{border-bottom:2px solid #e94560;padding-bottom:10px}h2{margin-top:40px;border-bottom:1px solid #ddd;padding-bottom:8px}table{border-collapse:collapse;width:100%;margin:16px 0}th,td{border:1px solid #ddd;padding:8px 12px;text-align:left}th{background:#f5f5f5}code{background:#f0f0f0;padding:2px 6px;border-radius:3px}blockquote{border-left:4px solid #e94560;margin:16px 0;padding:8px 16px;background:#fff5f5}hr{border:none;border-top:1px solid #eee;margin:30px 0}</style>'
          html = html.replace('</head>', css + '</head>')
          open('/tmp/tutorial.html','w').write(html)
          "
          python3 -c "import weasyprint; weasyprint.HTML('/tmp/tutorial.html').write_pdf('build/macos/Build/Products/Release/新手教程.pdf')"
      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/AutoTalkPro-macOS.zip" "Auto Talk Pro.app" "新手教程.pdf"
      - uses: actions/upload-artifact@v4
        with:
          name: AutoTalkPro-macOS
          path: AutoTalkPro-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Generate tutorial PDF
        shell: bash
        run: |
          pip install weasyprint
          pandoc docs/tutorial.md -f markdown -t html5 --standalone --metadata title="AutoTalk Pro 新手入门教程" -o tutorial.html
          python -c "
          html = open('tutorial.html', encoding='utf-8').read()
          css = '<style>body{font-family:Microsoft YaHei,sans-serif;max-width:800px;margin:0 auto;padding:40px;line-height:1.8;color:#333}h1{border-bottom:2px solid #e94560;padding-bottom:10px}h2{margin-top:40px;border-bottom:1px solid #ddd;padding-bottom:8px}table{border-collapse:collapse;width:100%;margin:16px 0}th,td{border:1px solid #ddd;padding:8px 12px;text-align:left}th{background:#f5f5f5}code{background:#f0f0f0;padding:2px 6px;border-radius:3px}blockquote{border-left:4px solid #e94560;margin:16px 0;padding:8px 16px;background:#fff5f5}hr{border:none;border-top:1px solid #eee;margin:30px 0}</style>'
          html = html.replace('</head>', css + '</head>')
          open('tutorial.html','w', encoding='utf-8').write(html)
          "
          python -c "import weasyprint; weasyprint.HTML('tutorial.html').write_pdf('build/windows/x64/runner/Release/新手教程.pdf')"
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "AutoTalkPro-Windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: AutoTalkPro-Windows
          path: AutoTalkPro-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # GitHub Release
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/AutoTalkPro-macOS/AutoTalkPro-macOS.zip
            artifacts/AutoTalkPro-Windows/AutoTalkPro-Windows.zip

      # Gitee Release（国内下载）
      - name: Create Gitee Release
        if: secrets.GITEE_TOKEN != ''
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # 创建 Gitee Release
          RELEASE_ID=$(curl -s -X POST "https://gitee.com/api/v5/repos/zoushiyong_admin/AutoTalkPro/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG_NAME}\",
              \"name\": \"${TAG_NAME}\",
              \"body\": \"AutoTalk Pro ${TAG_NAME}\\n\\n- macOS (Intel/Apple Silicon)\\n- Windows x64\",
              \"prerelease\": false
            }" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")

          echo "Gitee Release ID: $RELEASE_ID"

          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "None" ]; then
            # 上传 macOS 包
            curl -s -X POST "https://gitee.com/api/v5/repos/zoushiyong_admin/AutoTalkPro/releases/${RELEASE_ID}/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@artifacts/AutoTalkPro-macOS/AutoTalkPro-macOS.zip"

            # 上传 Windows 包
            curl -s -X POST "https://gitee.com/api/v5/repos/zoushiyong_admin/AutoTalkPro/releases/${RELEASE_ID}/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@artifacts/AutoTalkPro-Windows/AutoTalkPro-Windows.zip"

            echo "Gitee Release uploaded successfully"
          else
            echo "Gitee Release creation failed, skipping upload"
          fi
